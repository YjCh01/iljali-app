# 사용자: iljari.app 루트
# /seeker /admin /qc = 개발·내부 테스트용 서브경로

location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
}

location /web/ {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /web/index.html;
}

location /seeker/ {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /seeker/index.html;
}

# 예전 기업 전용 진입(/corporate/) → 통합 게이트웨이
location = /corporate/ {
    return 301 /;
}
location = /corporate {
    return 301 /;
}

location /admin/ {
    include /etc/nginx/snippets/admin-ip-allow.conf;
    root /usr/share/nginx/html;
    try_files $uri $uri/ /admin/index.html;
}

location /qc/ {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /qc/index.html;
}
