services:
  api:
    build: .
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://iljari:iljari@db:5432/iljari
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  edge:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${ILJARI_WEB_HOST_DIR:-/opt/iljari/web}:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/production.conf:/etc/nginx/conf.d/10-web.conf:ro
      - ./nginx/production-ssl.conf:/etc/nginx/conf.d/11-web-ssl.conf:ro
      - ./nginx/api-proxy.conf:/etc/nginx/conf.d/20-api.conf:ro
      - ./nginx/api-proxy-ssl.conf:/etc/nginx/conf.d/21-api-ssl.conf:ro
      - ./nginx/web-variants.conf:/etc/nginx/snippets/web-variants.conf:ro
      - ./nginx/admin-ip-allow.conf:/etc/nginx/snippets/admin-ip-allow.conf:ro
    depends_on:
      - api
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: iljari
      POSTGRES_PASSWORD: iljari
      POSTGRES_DB: iljari
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iljari"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
