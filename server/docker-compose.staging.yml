# Staging: Postgres + API (internal) + nginx (HTTPS :443)
# Usage: ./run_staging.sh  (from repo root)

services:
  api:
    build: .
    expose:
      - "8000"
    env_file:
      - .env.staging
    environment:
      DATABASE_URL: postgresql+psycopg2://iljari:iljari@db:5432/iljari
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - staging

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: iljari
      POSTGRES_PASSWORD: iljari
      POSTGRES_DB: iljari
    volumes:
      - pgdata_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iljari"]
      interval: 5s
      timeout: 5s
      retries: 8
    networks:
      - staging

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${STAGING_HTTPS_PORT:-443}:443"
      - "${STAGING_HTTP_PORT:-80}:80"
    volumes:
      - ./staging/nginx.generated.conf:/etc/nginx/conf.d/default.conf:ro
      - ./staging/certs:/etc/nginx/certs:ro
      - ./staging/web:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - staging

networks:
  staging:

volumes:
  pgdata_staging:
